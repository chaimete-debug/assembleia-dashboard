<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline — Assembleia Distrital</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-6">
  <div class="max-w-md w-full bg-white border border-slate-200 rounded-3xl shadow-sm p-8 text-center">
    <div class="text-5xl mb-4">📶</div>
    <h1 class="text-2xl font-bold text-slate-800">Sem ligação à internet</h1>
    <p class="text-slate-500 mt-3 text-sm leading-relaxed">
      O dashboard não conseguiu carregar neste momento.<br>
      Assim que a ligação voltar, actualize a página.
    </p>
    <button onclick="window.location.reload()" class="mt-6 px-6 py-2.5 bg-sky-500 text-white rounded-xl text-sm font-semibold hover:bg-sky-600 transition-colors">
      Tentar novamente
    </button>
  </div>
</body>
</html>
